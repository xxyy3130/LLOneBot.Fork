name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          corepack enable
          yarn install --no-immutable
          cd src/webui/FE && npm install

      - name: Run unit tests
        run: npm run test:unit

      - name: Run WebUI tests
        run: npm run test:webui

  build-test:
    name: Build Test
    runs-on: [self-hosted, llbot-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          corepack enable
          yarn install --no-immutable
          cd src/webui/FE && npm install

      - name: Build LLBot
        run: npm run build

      - name: Build WebUI
        run: npm run build-webui

      - name: Verify dist
        run: |
          test -f dist/llbot.js || (echo "dist/llbot.js not found" && exit 1)
          test -f dist/webui/index.html || (echo "dist/webui/index.html not found" && exit 1)
          echo "Build artifacts verified"

      - name: Docker build and run test
        run: |
          docker build -f docker/Dockerfile.test -t llbot-build-test .
          docker rm -f llbot-build-test 2>/dev/null || true
          docker run -d --name llbot-build-test \
            --network llbot-test_test_network \
            -e pmhq_host=pmhq1 \
            -e pmhq_port=13000 \
            -e WEBUI_PORT=3090 \
            llbot-build-test

          echo "Waiting for LLBot to connect to PMHQ..."
          for i in $(seq 1 60); do
            if docker logs llbot-build-test 2>&1 | grep -q "PMHQ WebSocket 连接成功"; then
              echo "LLBot connected to PMHQ successfully"
              docker rm -f llbot-build-test
              exit 0
            fi
            sleep 2
          done

          echo "ERROR: LLBot failed to connect to PMHQ within 120s"
          docker logs llbot-build-test 2>&1 | tail -30
          docker rm -f llbot-build-test
          exit 1

  e2e-test:
    name: E2E Tests
    runs-on: [self-hosted, llbot-test]
    needs: [unit-test, build-test]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          corepack enable
          yarn install --no-immutable
          cd src/webui/FE && npm install

      - name: Build
        run: |
          npm run build
          npm run build-webui

      - name: Build PR LLBot image
        run: docker build -f docker/Dockerfile.test -t llbot-pr-test .

      - name: Write llbot configs
        run: |
          mkdir -p workspace1/data workspace2/data

          cat > workspace1/data/config_1577491075.json << 'CONF'
          {
            "ob11": {
              "enable": true,
              "connect": [
                { "type": "http", "enable": true, "host": "", "port": 53000, "token": "123", "messageFormat": "array", "reportSelfMessage": false, "reportOfflineMessage": false, "debug": false }
              ]
            },
            "satori": { "enable": false },
            "milky": { "enable": false },
            "webui": { "enable": false }
          }
          CONF

          cat > workspace2/data/config_412805684.json << 'CONF'
          {
            "ob11": {
              "enable": true,
              "connect": [
                { "type": "http", "enable": true, "host": "", "port": 53001, "token": "123", "messageFormat": "array", "reportSelfMessage": false, "reportOfflineMessage": false, "debug": false }
              ]
            },
            "satori": { "enable": false },
            "milky": { "enable": false },
            "webui": { "enable": false }
          }
          CONF

      - name: Start PR LLBot containers
        run: |
          docker rm -f llbot-pr1 llbot-pr2 2>/dev/null || true

          docker run -d --name llbot-pr1 \
            --network llbot-test_test_network \
            -p 53000:53000 \
            -e pmhq_host=pmhq1 \
            -e pmhq_port=13000 \
            -e WEBUI_PORT=3091 \
            -v llbot-test_qq_volume1:/root/.config/QQ \
            -v ${{ github.workspace }}/workspace1/data:/app/llbot/data:rw \
            -v ${{ github.workspace }}/test/onebot11-api-test/tests/media:/app/llbot/test-media:ro \
            llbot-pr-test

          docker run -d --name llbot-pr2 \
            --network llbot-test_test_network \
            -p 53001:53001 \
            -e pmhq_host=pmhq2 \
            -e pmhq_port=13000 \
            -e WEBUI_PORT=3092 \
            -v llbot-test_qq_volume2:/root/.config/QQ \
            -v ${{ github.workspace }}/workspace2/data:/app/llbot/data:rw \
            -v ${{ github.workspace }}/test/onebot11-api-test/tests/media:/app/llbot/test-media:ro \
            llbot-pr-test

      - name: Wait for LLBot ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:53000/get_login_info -H "Authorization: Bearer 123" > /dev/null 2>&1; then
              echo "LLBot1 ready"
              break
            fi
            echo "Waiting for LLBot1... ($i/30)"
            sleep 5
          done
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:53001/get_login_info -H "Authorization: Bearer 123" > /dev/null 2>&1; then
              echo "LLBot2 ready"
              break
            fi
            echo "Waiting for LLBot2... ($i/30)"
            sleep 5
          done

      - name: Install test dependencies
        working-directory: test/onebot11-api-test
        run: npm install

      - name: Write test config
        run: |
          cat > test/onebot11-api-test/config/test.config.json << 'CONF'
          {
            "accounts": {
              "primary": {
                "host": "http://127.0.0.1:53000",
                "apiKey": "123",
                "protocol": "http",
                "user_id": "1577491075"
              },
              "secondary": {
                "host": "http://127.0.0.1:53001",
                "apiKey": "123",
                "protocol": "http",
                "user_id": "412805684"
              }
            },
            "test_group_id": "1098066573",
            "timeout": 30000,
            "retryAttempts": 3
          }
          CONF

      - name: Run OneBot11 API tests
        working-directory: test/onebot11-api-test
        run: npm test
        continue-on-error: true

      - name: Stop PR LLBot containers
        if: always()
        run: |
          echo "=== LLBot1 logs ===" && docker logs llbot-pr1 2>&1 | tail -30 || true
          echo "=== LLBot2 logs ===" && docker logs llbot-pr2 2>&1 | tail -30 || true
          docker rm -f llbot-pr1 llbot-pr2 2>/dev/null || true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: test/onebot11-api-test/test-report.html
          retention-days: 30

  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [unit-test, build-test, e2e-test]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Generate report comment
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              'unit-test': '${{ needs.unit-test.result }}',
              'build-test': '${{ needs.build-test.result }}',
              'e2e-test': '${{ needs.e2e-test.result }}',
            };

            const icons = { success: '✅', failure: '❌', skipped: '⏭️', cancelled: '🚫' };
            const lines = Object.entries(jobs).map(([name, result]) =>
              `| ${name} | ${icons[result] || '❓'} ${result} |`
            );

            const allPassed = Object.values(jobs).every(r => r === 'success' || r === 'skipped');
            const summary = allPassed ? '✅ All tests passed' : '❌ Some tests failed';

            const body = [
              `## Test Report`,
              ``,
              `| Job | Status |`,
              `|-----|--------|`,
              ...lines,
              ``,
              summary,
            ].join('\n');

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Test Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
